{% extends "base.html" %}
{% block title %}Scoreboard{% endblock %}
{% block content %}
<h1>{{ game | capitalize }} Scoreboard</h1>
<table>
    <tr>
        <th>Tag</th>
        <th>Score</th>
        <th>Time</th>
    </tr>
    {% for row in rows %}
    <tr>
        <td>{{ row.nickname }}</td>
        <td>{{ row.main_score }}</td>
        <td>{{ row.time_taken }}s</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
